# Nginx para subdominio academic.site.com
# Copiar a /etc/nginx/sites-available/ y enlazar en sites-enabled.
# Build del frontend con: VITE_API_BASE=https://academic.site.com/api
# Las peticiones irán a /api/auth/login, /api/students, etc.; Nginx reenvía al backend sin el prefijo /api.

# Redirigir HTTP -> HTTPS (activar cuando tengas SSL)
# server {
#     listen 80;
#     server_name academic.site.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    server_name academic.site.com;

    # Ruta a los estáticos del frontend (ajusta si usas Docker o otra ruta)
    root /var/www/academic.site.com;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: proxy al backend (puerto 3000). El trailing slash hace que /auth/login -> backend /auth/login
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}

