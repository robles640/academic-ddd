# Desarrollo local con Docker. Uso: docker compose up -d
# Frontend y Backend hablan por puertos del host.

services:
  postgres:
    image: postgres:16-alpine
    container_name: academic-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ostgres1
      POSTGRES_DB: academic
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: academic-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: change-me-in-production
      TYPEORM_HOST: postgres
      TYPEORM_PORT: 5432
      TYPEORM_USERNAME: postgres
      TYPEORM_PASSWORD: postgres
      TYPEORM_DATABASE: academic
      STUDENT_DEFAULT_PASSWORD: TempStudent1!
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        VITE_API_BASE: http://localhost:3000
    container_name: academic-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend